<!DOCTYPE html>
<html>
<head><title>生成图标</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<pre id="log"></pre>
<script>
function log(msg) { document.getElementById('log').textContent += msg + '\n'; }

function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  const cx = size / 2, cy = size / 2;
  const r = size * 0.44;

  // Background
  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, '#7c6aff');
  bg.addColorStop(1, '#ff6a9e');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(size * 0.08, size * 0.08, size * 0.84, size * 0.84, size * 0.14);
  ctx.fill();

  // Magnifier circle
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx - size * 0.05, cy - size * 0.02, r * 0.72, 0, Math.PI * 2);
  ctx.fill();

  // Inner gradient for glass
  const glass = ctx.createRadialGradient(cx - size * 0.06, cy - size * 0.04, 0, cx, cy, r * 0.72);
  glass.addColorStop(0, 'rgba(124,106,255,0.3)');
  glass.addColorStop(1, 'rgba(124,106,255,0.05)');
  ctx.fillStyle = glass;
  ctx.beginPath();
  ctx.arc(cx - size * 0.05, cy - size * 0.02, r * 0.72, 0, Math.PI * 2);
  ctx.fill();

  // Lens highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = size * 0.025;
  ctx.beginPath();
  ctx.arc(cx - size * 0.05, cy - size * 0.02, r * 0.58, -Math.PI * 0.7, -Math.PI * 0.2);
  ctx.stroke();

  // Handle
  const handleAngle = Math.PI * 0.38;
  const handleStart = { x: cx + Math.cos(handleAngle) * r * 0.68, y: cy + Math.sin(handleAngle) * r * 0.68 };
  const handleEnd = { x: cx + Math.cos(handleAngle) * r * 1.22, y: cy + Math.sin(handleAngle) * r * 1.22 };
  ctx.strokeStyle = 'white';
  ctx.lineWidth = size * 0.1;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(handleStart.x, handleStart.y);
  ctx.lineTo(handleEnd.x, handleEnd.y);
  ctx.stroke();

  // AI sparkle
  const sparkleX = cx + r * 0.45, sparkleY = cy - r * 0.42;
  ctx.fillStyle = '#2dffb4';
  ctx.beginPath();
  ctx.moveTo(sparkleX, sparkleY - size * 0.05);
  ctx.lineTo(sparkleX + size * 0.025, sparkleY);
  ctx.lineTo(sparkleX, sparkleY + size * 0.05);
  ctx.lineTo(sparkleX - size * 0.025, sparkleY);
  ctx.closePath();
  ctx.fill();
}

function saveIcon(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  drawIcon(canvas);
  const dataUrl = canvas.toDataURL('image/png');
  const link = document.createElement('a');
  link.href = dataUrl;
  link.download = filename;
  link.click();
  log('✓ 保存: ' + filename);
}

saveIcon('c192', 'icon-192.png');
saveIcon('c512', 'icon-512.png');
log('\n如果下载没有自动开始，请手动点击上面生成的文件。');
log('然后把 icon-192.png 和 icon-512.png 放到 truthlens-web/icons/ 文件夹中。');
</script>
</body>
</html>
